<div class="min-h-screen bg-gray-100 flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">

    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-800">Crear cuenta</h1>
      <p class="text-gray-500 text-sm mt-1">Completa los datos para registrarte</p>
    </div>

    <div *ngIf="error" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4 text-sm">
      {{ error }}
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
      <input type="text" [(ngModel)]="username" placeholder="Nombre de usuario"
        class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
      <input type="email" [(ngModel)]="email" placeholder="correo@ejemplo.com"
        class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    </div>

    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
      <input type="password" [(ngModel)]="password" placeholder="Mínimo 6 caracteres"
        class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    </div>
    
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">Rol</label>
      <select [(ngModel)]="rol"
       class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      <option value="ADMIN">Administrador</option>
      <option value="VENDEDOR">Vendedor</option>
      </select>
    </div>

    <button (click)="registrar()" [disabled]="loading"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md text-sm transition disabled:opacity-50">
      {{ loading ? 'Registrando...' : 'Crear cuenta' }}
    </button>

    <p class="text-center text-sm text-gray-500 mt-4">
      ¿Ya tienes cuenta? <a routerLink="/login" class="text-blue-600 hover:underline">Inicia sesión</a>
    </p>

  </div>
</div>
