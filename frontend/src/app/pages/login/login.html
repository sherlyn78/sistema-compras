<div class="min-h-screen bg-gray-100 flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">

    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-800">Sistema de Compras</h1>
      <p class="text-gray-500 text-sm mt-1">Inicia sesión para continuar</p>
    </div>
    
    <div *ngIf="error" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4 text-sm">
    {{ error }}
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
      <input
        type="text"
        [(ngModel)]="username"
        placeholder="Ingresa tu usuario"
        class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="Ingresa tu contraseña"
        class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <button
      (click)="login()"
      [disabled]="loading"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md text-sm transition disabled:opacity-50">
      {{ loading ? 'Iniciando sesión...' : 'Iniciar sesión' }}
    </button>

    <p class="text-center text-sm text-gray-500 mt-4">
    ¿No tienes cuenta? <a routerLink="/register" class="text-blue-600 hover:underline">Regístrate</a>
    </p>

  </div>
</div>
